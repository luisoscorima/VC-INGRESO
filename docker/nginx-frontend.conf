server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA Angular con hash routing (#/...)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Nunca cachear el shell: evita que el navegador sirva JS/CSS viejos tras un deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type application/json;
    }

    location = /site.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Assets con hash en el nombre (outputHashing: all)
    location ~* \.(?:js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
