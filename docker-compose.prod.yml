# Producción: frontend (nginx) + api + mysql (todo en contenedores).
# Imágenes: GitHub Actions publica en GHCR (tag main). En el servidor: pull + up (sin --build).
# Uso: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
# Build local (fallback): docker compose -f docker-compose.prod.yml up -d --build
# Variables opcionales en .env: VC_IMAGE_TAG=main | VC_API_IMAGE | VC_FRONTEND_IMAGE
# Nota: pensado para ir detrás de Nginx Proxy Manager, sin publicar puertos.
services:
  mysql:
    image: mysql:8.0
    container_name: vc-ingreso-mysql
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      - TZ=America/Lima
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=${DB_NAME:-vc_db}
      - MYSQL_CHARSET=${DB_CHARSET:-utf8mb4}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init-docker.sh:/docker-entrypoint-initdb.d/01-init-docker.sh:ro
      - ./database/vc_create_database.sql:/docker-entrypoint-initdb.d/02-vc_create_database.sql.template:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=America/Lima --event-scheduler=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - default
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${VC_API_IMAGE:-ghcr.io/luisoscorima/vc-ingreso-api:${VC_IMAGE_TAG:-main}}
    pull_policy: always
    container_name: vc-ingreso-api
    env_file:
      - .env
    environment:
      - TZ=America/Lima
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-vc_db}
      - DB_LICENSE_NAME=${DB_LICENSE_NAME:-crearttech_clientes}
      - DB_USER=root
      - DB_PASS=${DB_PASS}
      - DB_CHARSET=${DB_CHARSET:-utf8mb4}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=0
    volumes:
      - uploads_data:/var/www/html/uploads
      - readonly_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - nginx-proxy-manager_default

  frontend:
    environment:
      - TZ=America/Lima
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_VERSION: ${VC_IMAGE_TAG:-main}
    image: ${VC_FRONTEND_IMAGE:-ghcr.io/luisoscorima/vc-ingreso-frontend:${VC_IMAGE_TAG:-main}}
    pull_policy: always
    container_name: vc-ingreso-frontend
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - nginx-proxy-manager_default

volumes:
  mysql_data:
  uploads_data:
  readonly_data:

networks:
  default:
    driver: bridge
  nginx-proxy-manager_default: 
    driver: bridge
    external: true
    name: nginx-proxy-manager_default
